name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend ────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: gokaatru_test
          POSTGRES_USER: gokaatru
          POSTGRES_PASSWORD: gokaatru
        options: >-
          --health-cmd "pg_isready -U gokaatru -d gokaatru_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: "postgresql+asyncpg://gokaatru:gokaatru@localhost:5432/gokaatru_test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: backend
        run: |
          sed -i "s|postgresql+psycopg2://.*|postgresql+psycopg2://gokaatru:gokaatru@localhost:5432/gokaatru_test|" alembic.ini
          alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -q --tb=short

  # ── Frontend ───────────────────────────────────────────────
  frontend-lint-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  # ── Docker build ───────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gokaatru-backend ./backend

      - name: Build frontend image
        run: docker build -t gokaatru-frontend ./frontend

      - name: Verify compose config
        run: docker compose config --quiet
